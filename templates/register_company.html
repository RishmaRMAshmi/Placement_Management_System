{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4 shadow">
                <h2 class="text-center mb-4">Company Registration</h2>

                <form method="POST">

                    <div class="mb-3 row align-items-center">
                        <label class="col-sm-4 col-form-label ">Name:</label>
                        <div class="col-sm-8">
                            <input name="name" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3 row align-items-center">
                        <label class="col-sm-4 col-form-label ">Email:</label>
                        <div class="col-sm-8">
                            <input name="email" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3 row align-items-center">
                        <label class="col-sm-4 col-form-label ">Password:</label>
                        <div class="col-sm-8">
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3 row align-items-center">
                        <label class="col-sm-4 col-form-label ">Website:</label>
                        <div class="col-sm-8">
                        <input type="url" name="website" 
                                class="form-control" 
                                placeholder="https://example.com" 
                                required>
                        </div>
                    </div>
                    <div class="mb-3 row align-items-center">
                        <label class="col-sm-4 col-form-label ">HR Contact:</label>
                        <div class="col-sm-8">
                            <input type="text" name="hr_contact" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4 row align-items-center">
                        <label class="col-sm-4 col-form-label ">Location:</label>
                        <div class="col-sm-8">
                            <input name="location" class="form-control" required>
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary w-100">
                            Register
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
